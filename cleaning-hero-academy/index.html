<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Cleaning Hero Academy</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{background:#0a0a14;color:#e2e8f0;font-family:'DM Sans',sans-serif;min-height:100vh}
::-webkit-scrollbar{width:6px}::-webkit-scrollbar-track{background:#0a0a14}::-webkit-scrollbar-thumb{background:#2d1e5e;border-radius:3px}

#app{max-width:800px;margin:0 auto;padding:16px 16px 60px}

/* Header */
.header{text-align:center;padding:28px 0 8px}
.logo{font-family:'Space Grotesk',sans-serif;font-size:30px;font-weight:700;color:#fff;letter-spacing:-0.5px}
.logo span{background:linear-gradient(135deg,#e879f9,#f472b6);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.subtitle{font-size:13px;color:#7c6f9b;margin-top:4px;font-style:italic}
.day-theme{margin-top:10px;font-family:'Space Grotesk',sans-serif;font-size:16px;font-weight:600;color:#c084fc;letter-spacing:0.3px}
.day-theme .realm-icon{font-size:22px;margin-right:4px}

/* Stats Bar */
.stats-bar{display:flex;gap:12px;justify-content:center;margin:16px 0;flex-wrap:wrap}
.stat-badge{background:#110f1f;border:1px solid #2a1f4e;border-radius:12px;padding:10px 18px;text-align:center;min-width:100px}
.stat-value{font-family:'Space Grotesk',sans-serif;font-size:22px;font-weight:700;color:#e879f9}
.stat-label{font-size:11px;color:#7c6f9b;text-transform:uppercase;letter-spacing:0.5px;margin-top:2px}
.stat-badge.streak .stat-value{color:#fb923c}
.stat-badge.level .stat-value{color:#818cf8}

/* Progress Card */
.card{background:#110f1f;border:1px solid #2a1f4e;border-radius:16px;padding:20px 24px;margin-bottom:16px}
.card-title{font-size:13px;font-weight:600;color:#7c6f9b;margin-bottom:12px;text-transform:uppercase;letter-spacing:0.5px}
.progress-wrap{background:#0a0a14;border-radius:10px;height:28px;overflow:hidden;position:relative}
.progress-fill{height:100%;border-radius:10px;background:linear-gradient(90deg,#a855f7,#e879f9);transition:width 0.5s ease;min-width:0}
.progress-text{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-family:'Space Grotesk',sans-serif;font-size:13px;font-weight:600;color:#fff;text-shadow:0 1px 3px rgba(0,0,0,0.5)}
.victory-banner{display:none;text-align:center;padding:12px;margin-top:12px;background:linear-gradient(135deg,#a855f722,#f472b622);border:1px solid #e879f944;border-radius:12px;font-weight:700;color:#e879f9;font-size:18px;animation:pulse 1.5s infinite}
.victory-banner.show{display:block}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.7}}

/* Quest Cards */
.quests-title{font-size:15px;font-weight:700;color:#fff;margin:20px 0 12px;font-family:'Space Grotesk',sans-serif}
.quests-grid{display:grid;grid-template-columns:1fr;gap:10px}
@media(min-width:560px){.quests-grid{grid-template-columns:1fr 1fr}}

.quest-card{background:#110f1f;border:1px solid #2a1f4e;border-radius:14px;padding:16px;display:flex;align-items:center;gap:14px;cursor:pointer;transition:all 0.2s;user-select:none}
.quest-card:hover{border-color:#e879f944;transform:translateY(-2px);box-shadow:0 4px 20px rgba(168,85,247,0.15)}
.quest-card.completed{opacity:0.4;border-color:#2a1f4e}
.quest-card.completed:hover{transform:none;box-shadow:none}
.quest-card.completed .quest-name{text-decoration:line-through}

.quest-emoji{font-size:32px;flex-shrink:0;width:44px;text-align:center}
.quest-info{flex:1;min-width:0}
.quest-realm{font-size:10px;font-weight:600;color:#7c6f9b;text-transform:uppercase;letter-spacing:0.5px}
.quest-name{font-size:14px;font-weight:600;color:#e2e8f0;margin-top:2px}
.quest-right{text-align:right;flex-shrink:0}
.quest-points{font-family:'Space Grotesk',sans-serif;font-size:16px;font-weight:700;color:#c084fc}
.quest-diff{font-size:10px;font-weight:600;border-radius:6px;padding:2px 8px;margin-top:4px;display:inline-block}
.diff-easy{background:#22c55e22;color:#4ade80}
.diff-medium{background:#f59e0b22;color:#fbbf24}
.diff-hard{background:#ef444422;color:#f87171}

.quest-check{width:26px;height:26px;border-radius:50%;border:2px solid #3b2d6e;flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all 0.2s}
.quest-card.completed .quest-check{background:linear-gradient(135deg,#a855f7,#e879f9);border-color:#e879f9}
.quest-card.completed .quest-check::after{content:'✓';color:#fff;font-weight:700;font-size:14px}

/* Achievements */
.achievements-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:10px}
.achievement{background:#0a0a14;border:1px solid #2a1f4e;border-radius:12px;padding:14px 10px;text-align:center;transition:all 0.2s}
.achievement.unlocked{border-color:#fbbf2444;background:#1a1530}
.achievement.unlocked .ach-icon{filter:none}
.ach-icon{font-size:28px;filter:grayscale(1) brightness(0.4)}
.ach-name{font-size:11px;font-weight:600;color:#7c6f9b;margin-top:6px}
.achievement.unlocked .ach-name{color:#fbbf24}

/* Avatar */
.avatar-section{text-align:center;margin:8px 0 16px}
.avatar-char{font-size:64px;line-height:1;transition:all 0.3s}
.avatar-title{font-family:'Space Grotesk',sans-serif;font-size:14px;font-weight:700;color:#c084fc;margin-top:6px}
.avatar-rank{font-size:11px;color:#7c6f9b;margin-top:2px}
.level-progress{max-width:260px;margin:10px auto 0;background:#0a0a14;border-radius:8px;height:14px;overflow:hidden;position:relative}
.level-fill{height:100%;border-radius:8px;background:linear-gradient(90deg,#818cf8,#c084fc);transition:width 0.5s}
.level-text{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:9px;font-weight:600;color:#fff}

/* Skill Tree */
.skill-tree-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:10px}
.skill-node{background:#0a0a14;border:1px solid #2a1f4e;border-radius:12px;padding:14px 10px;text-align:center;transition:all 0.2s;position:relative}
.skill-node.unlocked{border-color:#22c55e44;background:#0f1a0f}
.skill-node.locked{opacity:0.5}
.skill-icon{font-size:26px;margin-bottom:4px}
.skill-name{font-size:12px;font-weight:700;color:#e2e8f0;margin-bottom:2px}
.skill-desc{font-size:10px;color:#7c6f9b}
.skill-req{font-size:9px;color:#ef4444;margin-top:4px}
.skill-node.unlocked .skill-req{color:#4ade80}

/* Boss Battle */
.boss-card{background:linear-gradient(135deg,#1a0a1e,#1e0f25);border:2px solid #ef444466;border-radius:16px;padding:20px 24px;margin-bottom:16px;position:relative;overflow:hidden}
.boss-card::before{content:'';position:absolute;top:0;left:0;right:0;bottom:0;background:linear-gradient(45deg,transparent 40%,rgba(239,68,68,0.05) 50%,transparent 60%);animation:bossShimmer 3s infinite}
@keyframes bossShimmer{0%{transform:translateX(-100%)}100%{transform:translateX(100%)}}
.boss-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.boss-title{font-family:'Space Grotesk',sans-serif;font-size:16px;font-weight:700;color:#f87171}
.boss-xp{font-family:'Space Grotesk',sans-serif;font-size:14px;font-weight:700;color:#fbbf24}
.boss-hp-label{font-size:11px;color:#7c6f9b;margin-bottom:4px}
.boss-hp-wrap{background:#0a0a14;border-radius:8px;height:22px;overflow:hidden;position:relative;margin-bottom:12px}
.boss-hp-fill{height:100%;border-radius:8px;background:linear-gradient(90deg,#ef4444,#f87171);transition:width 0.5s ease}
.boss-hp-text{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:11px;font-weight:600;color:#fff}
.boss-tasks{display:flex;flex-direction:column;gap:6px}
.boss-task{display:flex;align-items:center;gap:10px;padding:8px 12px;background:#0a0a1466;border:1px solid #2a1f4e;border-radius:10px;cursor:pointer;transition:all 0.2s;font-size:13px;color:#e2e8f0}
.boss-task:hover{border-color:#f8717144}
.boss-task.done{opacity:0.4;text-decoration:line-through}
.boss-task-check{width:20px;height:20px;border-radius:50%;border:2px solid #5a2d2d;flex-shrink:0;display:flex;align-items:center;justify-content:center}
.boss-task.done .boss-task-check{background:#ef4444;border-color:#ef4444}
.boss-task.done .boss-task-check::after{content:'✓';color:#fff;font-size:11px;font-weight:700}
.boss-defeated{text-align:center;padding:10px;font-weight:700;color:#fbbf24;font-size:15px}

/* Combo indicator */
.combo-bar{display:none;text-align:center;margin:10px 0;padding:8px 14px;background:linear-gradient(135deg,#f59e0b22,#ef444422);border:1px solid #f59e0b44;border-radius:10px;font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:14px;color:#fbbf24}
.combo-bar.show{display:block}
.combo-bar .combo-mult{color:#f87171;font-size:18px}

/* Random event quest */
.quest-card.event-quest{border-color:#f59e0b66;background:linear-gradient(135deg,#1a1520,#1f1a10);animation:eventGlow 2s infinite}
@keyframes eventGlow{0%,100%{box-shadow:0 0 8px rgba(245,158,11,0.15)}50%{box-shadow:0 0 18px rgba(245,158,11,0.3)}}
.event-badge{font-size:9px;font-weight:700;color:#fbbf24;background:#f59e0b22;padding:2px 6px;border-radius:4px;margin-left:6px;vertical-align:middle}

/* Loot drops */
.loot-modal-overlay{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.7);z-index:1000;align-items:center;justify-content:center}
.loot-modal-overlay.show{display:flex}
.loot-modal{background:#1a1530;border:2px solid #c084fc;border-radius:20px;padding:30px;text-align:center;max-width:320px;width:90%;animation:lootPop 0.3s ease}
@keyframes lootPop{from{transform:scale(0.7);opacity:0}to{transform:scale(1);opacity:1}}
.loot-title{font-family:'Space Grotesk',sans-serif;font-size:18px;font-weight:700;color:#e879f9;margin-bottom:8px}
.loot-icon{font-size:48px;margin:12px 0}
.loot-name{font-size:16px;font-weight:700;color:#fbbf24;margin-bottom:4px}
.loot-desc{font-size:12px;color:#7c6f9b;margin-bottom:16px}
.loot-close{background:linear-gradient(135deg,#a855f7,#e879f9);border:none;color:#fff;padding:10px 28px;border-radius:10px;font-weight:700;font-size:14px;cursor:pointer}

/* Toast */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(100px);background:linear-gradient(135deg,#a855f7,#e879f9);color:#fff;padding:14px 28px;border-radius:14px;font-weight:700;font-size:14px;z-index:999;transition:transform 0.4s ease;box-shadow:0 8px 30px rgba(168,85,247,0.4)}
.toast.show{transform:translateX(-50%) translateY(0)}

/* Reset button */
.reset-wrap{text-align:center;margin-top:24px}
.reset-btn{background:transparent;border:1px solid #2a1f4e;color:#7c6f9b;padding:8px 18px;border-radius:10px;cursor:pointer;font-size:12px}
.reset-btn:hover{border-color:#ef4444;color:#ef4444}
</style>
</head>
<body>
<div id="app">
  <div class="header">
    <div class="logo">✨ Cleaning Hero <span>Academy</span></div>
    <div class="subtitle">~ Your training arc begins now, senpai ~</div>
    <div class="day-theme" id="day-theme"></div>
  </div>
  <div class="avatar-section">
    <div class="avatar-char" id="avatar-char"></div>
    <div class="avatar-title" id="avatar-title"></div>
    <div class="avatar-rank" id="avatar-rank"></div>
    <div class="level-progress"><div class="level-fill" id="level-fill"></div><div class="level-text" id="level-text"></div></div>
  </div>
  <div class="stats-bar">
    <div class="stat-badge level"><div class="stat-value" id="s-level">1</div><div class="stat-label">Level</div></div>

    <div class="victory-banner" id="victory">🌸 SUGOI! DAILY MISSION COMPLETE! 🌸</div>
  </div>
  <div class="combo-bar" id="combo-bar">COMBO: <span class="combo-mult" id="combo-count">x2</span> — Bonus XP active!</div>
  <div class="quests-title">📜 Today's Missions</div>
  <div class="quests-grid" id="quests-grid"></div>
  <div id="boss-section"></div>
  <div class="card" style="margin-top:20px">
    <div class="card-title">🌳 Skill Tree</div>
    <div class="skill-tree-grid" id="skill-tree"></div>
  </div>
  <div class="card" style="margin-top:20px">

  </div>
  <div class="reset-wrap"><button class="reset-btn" onclick="resetAll()">Reset All Progress</button></div>
</div>
<div class="loot-modal-overlay" id="loot-overlay" onclick="closeLoot()">

    <div class="loot-title">✨ Loot Drop! ✨</div>
    <div class="loot-icon" id="loot-icon"></div>
    <div class="loot-name" id="loot-name"></div>
    <div class="loot-desc" id="loot-desc"></div>
    <button class="loot-close" onclick="closeLoot()">Yatta! Claim It!</button>
  </div>
</div>
<div class="toast" id="toast"></div>

/* ========== SEEDED PRNG ========== */
function mulberry32(a){return function(){a|=0;a=a+0x6D2B79F5|0;var t=Math.imul(a^a>>>15,1|a);t=t+Math.imul(t^t>>>7,61|t)^t;return((t^t>>>14)>>>0)/4294967296}}
function getDayOfYear(d){var s=new Date(d.getFullYear(),0,0);return Math.floor((d-s)/86400000)}
function todayStr(){return new Date().toLocaleDateString('en-CA')}

/* ========== QUEST GENERATION (day-themed) ========== */
function getTodayRealm(dateStr){
  var d=new Date(dateStr+'T00:00:00');
  return DAY_REALMS[d.getDay()];
}
function generateDailyQuests(dateStr){
  var d=new Date(dateStr+'T00:00:00');
  var seed=getDayOfYear(d)*2654435761+d.getFullYear();
  var rng=mulberry32(seed);
  var todayRealm=getTodayRealm(dateStr).realm;
  var realmTasks=TASKS.filter(function(t){return t.realm===todayRealm});
  var pool=realmTasks.map(function(t){return{t:t,r:rng()}});
  pool.sort(function(a,b){return a.r-b.r});
  var picked=pool.slice(0,Math.min(6,pool.length)).map(function(p){return p.t});
  // 40% chance to inject a random event quest
  if(rng()<0.4){
    var evIdx=Math.floor(rng()*EVENT_QUESTS.length);
    picked.push(EVENT_QUESTS[evIdx]);
  }
  return picked;
}

/* ========== STATE MANAGEMENT ========== */
function defaultState(){
  return {totalXP:0,streak:0,lastDate:'',todayDone:[],dailyGoalMet:false,
    unlocked:{},realmCounts:{Kitchen:0,Bathroom:0,Floors:0,Yard:0,Bedroom:0,'Living Room':0,Laundry:0},totalCompleted:0,
    loot:[],lastCompleteTime:0,comboCount:0,history:{}};
}
function loadState(){
  try{var s=localStorage.getItem(STORAGE_KEY);return s?JSON.parse(s):defaultState()}catch(e){return defaultState()}
}
function saveState(){localStorage.setItem(STORAGE_KEY,JSON.stringify(state))}

var state=loadState();
var dailyQuests=[];

function checkNewDay(){
  var today=todayStr();
  if(state.lastDate===today){return}
  // Check streak
  if(state.lastDate){
    var last=new Date(state.lastDate+'T00:00:00'),now=new Date(today+'T00:00:00');
    var diff=Math.round((now-last)/86400000);
    if(diff===1&&state.dailyGoalMet){state.streak++}
    else if(diff>1||!state.dailyGoalMet){state.streak=0}
  }
  state.lastDate=today;
  state.todayDone=[];
  state.dailyGoalMet=false;
  saveState();
}

/* ========== GAME LOGIC ========== */
function getLevel(xp){return Math.floor(xp/XP_PER_LEVEL)+1}
function getLevelProgress(xp){return xp%XP_PER_LEVEL}
function getDailyXP(){
  var sum=0;
  dailyQuests.forEach(function(q){if(state.todayDone.indexOf(q.id)!==-1)sum+=q.pts});
  return sum;
}
function realmEmoji(realm){var r=REALMS.find(function(x){return x.name===realm});return r?r.emoji:'📦'}

function completeQuest(id){
  if(state.todayDone.indexOf(id)!==-1)return;
  var quest=dailyQuests.find(function(q){return q.id===id});
  if(!quest)return;
  state.todayDone.push(id);
  // Combo system
  var now=Date.now();
  var cw=getEffectiveComboWindow();
  if(state.lastCompleteTime&&(now-state.lastCompleteTime)<cw){
    state.comboCount=(state.comboCount||0)+1;
  }else{state.comboCount=1}
  state.lastCompleteTime=now;
  var comboMult=state.comboCount>=3?1.5:state.comboCount>=2?1.25:1;
  var xpGained=Math.round(quest.pts*comboMult*getXPMultiplier());
  state.totalXP+=xpGained;
  state.totalCompleted=(state.totalCompleted||0)+1;
  if(quest.realm!=='Any') state.realmCounts[quest.realm]=(state.realmCounts[quest.realm]||0)+1;
  // Check daily goal
  if(!state.dailyGoalMet&&getDailyXP()>=getDailyGoal()){
    state.dailyGoalMet=true;
    if(state.streak===0&&state.lastDate===todayStr())state.streak=1;
  }
  // Show combo toast
  if(comboMult>1) showToast('⚡ '+state.comboCount+'x COMBO! +'+xpGained+' XP!');
  // Loot drop chance (scaled by skill)
  var baseLoot=quest.diff==='Hard'?0.4:quest.diff==='Medium'?0.25:0.15;
  var lootChance=getEffectiveLootChance(baseLoot);
  if(Math.random()<lootChance) rollLoot();
  checkAchievements();
  saveState();
  render();
}

/* ========== LOOT SYSTEM ========== */
function rollLoot(){
  var roll=Math.random();
  var pool;
  if(roll<0.05) pool=LOOT_TABLE.filter(function(l){return l.rarity==='legendary'});
  else if(roll<0.2) pool=LOOT_TABLE.filter(function(l){return l.rarity==='rare'});
  else if(roll<0.5) pool=LOOT_TABLE.filter(function(l){return l.rarity==='uncommon'});
  else pool=LOOT_TABLE.filter(function(l){return l.rarity==='common'});
  var item=pool[Math.floor(Math.random()*pool.length)];
  if(!state.loot) state.loot=[];
  state.loot.push({id:item.id,name:item.name,date:todayStr()});
  showLoot(item);
}
function showLoot(item){
  document.getElementById('loot-icon').textContent=item.icon;
  document.getElementById('loot-name').textContent=item.name;
  document.getElementById('loot-desc').textContent=item.desc+' ('+item.rarity+')';
  document.getElementById('loot-overlay').className='loot-modal-overlay show';
}
function closeLoot(){document.getElementById('loot-overlay').className='loot-modal-overlay'}

/* ========== BOSS BATTLES ========== */
const BOSSES = [
  {id:'boss_kitchen',name:'The Grease Overlord',realm:'Kitchen',xp:200,emoji:'👹',
    tasks:['Deep clean oven interior','Scrub all cabinet fronts','Sanitize the sink & drain','Clean behind appliances','Wipe down all handles & knobs']},
  {id:'boss_bath',name:'Mold Demon King',realm:'Bathroom',xp:200,emoji:'🧟',
    tasks:['Deep scrub shower grout','Clean exhaust fan','Descale all faucets','Wash shower curtain','Sanitize trash can']},
  {id:'boss_floors',name:'The Dust Titan',realm:'Floors',xp:200,emoji:'👾',
    tasks:['Move furniture & vacuum under','Steam mop all hard floors','Deep clean all rugs','Scrub floor corners','Polish hardwood areas']},
  {id:'boss_yard',name:'Weed Dragon',realm:'Yard',xp:250,emoji:'🐲',
    tasks:['Edge all walkways','Clear gutters','Power wash driveway','Prune all bushes','Clean outdoor furniture']},
  {id:'boss_bedroom',name:'Chaos Phantom',realm:'Bedroom',xp:200,emoji:'👻',
    tasks:['Rotate & flip mattress','Wash all bedding','Deep clean closet','Dust ceiling fan & lights','Organize all drawers']},
  {id:'boss_living',name:'Clutter Shogun',realm:'Living Room',xp:200,emoji:'🥷',
    tasks:['Deep clean upholstery','Wash all throw blankets','Dust all decor & shelves','Clean all electronics','Wash windows inside & out']},
  {id:'boss_laundry',name:'The Lint Wraith',realm:'Laundry',xp:175,emoji:'🦠',
    tasks:['Clean dryer vent duct','Deep clean washer drum','Organize all supplies','Wipe down machines','Clean laundry room floor']},
];
function getWeeklyBoss(dateStr){
  var d=new Date(dateStr+'T00:00:00');
  var weekNum=Math.floor(getDayOfYear(d)/7);
  return BOSSES[weekNum%BOSSES.length];
}
function completeBossTask(idx){
  if(!state.bossDone) state.bossDone=[];
  if(state.bossDone.indexOf(idx)!==-1) return;
  state.bossDone.push(idx);
  var boss=getWeeklyBoss(todayStr());
  if(state.bossDone.length>=boss.tasks.length){
    state.totalXP+=boss.xp;
    showToast(boss.emoji+' BOSS DEFEATED! +'+boss.xp+' XP!');
    state.bossDefeated=true;
  }
  checkAchievements();
  saveState();render();
}
function renderBoss(){
  var sec=document.getElementById('boss-section');
  var boss=getWeeklyBoss(todayStr());
  if(!state.bossDone) state.bossDone=[];
  if(!state.bossWeek) state.bossWeek='';
  var d=new Date(todayStr()+'T00:00:00');
  var weekId=d.getFullYear()+'-w'+Math.floor(getDayOfYear(d)/7);
  if(state.bossWeek!==weekId){state.bossWeek=weekId;state.bossDone=[];state.bossDefeated=false;saveState()}
  var done=state.bossDone||[];
  var hpPct=Math.max(0,Math.round((1-done.length/boss.tasks.length)*100));
  var html='<div class="boss-card"><div class="boss-header"><div class="boss-title">'+boss.emoji+' WEEKLY BOSS: '+boss.name+'</div><div class="boss-xp">'+boss.xp+' XP</div></div>';
  html+='<div class="boss-hp-label">Boss HP</div><div class="boss-hp-wrap"><div class="boss-hp-fill" style="width:'+hpPct+'%"></div><div class="boss-hp-text">'+done.length+'/'+boss.tasks.length+' hits</div></div>';
  if(state.bossDefeated){
    html+='<div class="boss-defeated">🎌 BOSS DEFEATED! You are victorious! 🎌</div>';
  }else{
    html+='<div class="boss-tasks">';
    boss.tasks.forEach(function(t,i){
      var d2=done.indexOf(i)!==-1;
      html+='<div class="boss-task'+(d2?' done':'')+'" onclick="completeBossTask('+i+')"><div class="boss-task-check"></div>'+t+'</div>';
    });
    html+='</div>';
  }
  html+='</div>';
  sec.innerHTML=html;
}

function checkAchievements(){
  var dominated=getDailyXP(), tc=state.totalCompleted||0, newUnlocks=[];
  function tryUnlock(id){if(!state.unlocked[id]){state.unlocked[id]=todayStr();newUnlocks.push(id)}}
  if(tc>=1)tryUnlock('first_quest');
  if(tc>=10)tryUnlock('ten_quests');
  if(tc>=50)tryUnlock('fifty_quests');
  if(state.dailyGoalMet)tryUnlock('first_victory');
  if(state.streak>=3)tryUnlock('streak_3');
  if(state.streak>=7)tryUnlock('streak_7');
  if(state.streak>=30)tryUnlock('streak_30');
  if(state.todayDone.length===dailyQuests.length&&dailyQuests.length>0)tryUnlock('perfectionist');
  if(state.totalXP>=500)tryUnlock('xp_500');
  if(state.totalXP>=2000)tryUnlock('xp_2000');
  if((state.realmCounts['Kitchen']||0)>=15)tryUnlock('kitchen_master');
  if((state.realmCounts['Floors']||0)>=15)tryUnlock('floor_master');
  newUnlocks.forEach(function(uid){
    var a=ACHIEVEMENTS.find(function(x){return x.id===uid});
    if(a)showToast(a.icon+' Achievement: '+a.name+'!');
  });
}

/* ========== CHARACTER AVATAR ========== */
const AVATARS = [
  {minLvl:1,  char:'🧹', title:'Cleaning Apprentice', rank:'D-Rank Cleaner'},
  {minLvl:3,  char:'🧽', title:'Scrub Genin', rank:'C-Rank Cleaner'},
  {minLvl:6,  char:'🧑‍🎓', title:'Academy Student', rank:'C-Rank Cleaner'},
  {minLvl:10, char:'⚔️', title:'Cleaning Chunin', rank:'B-Rank Cleaner'},
  {minLvl:15, char:'🥷', title:'Shadow Sweeper', rank:'B-Rank Cleaner'},
  {minLvl:20, char:'🦸', title:'Cleaning Hero', rank:'A-Rank Cleaner'},
  {minLvl:25, char:'👑', title:'Grand Sensei', rank:'S-Rank Cleaner'},
  {minLvl:35, char:'🌟', title:'Legendary Cleaning God', rank:'SS-Rank Cleaner'},
  {minLvl:50, char:'🐉', title:'Dragon of Spotlessness', rank:'SSS-Rank Cleaner'},
];
function getAvatar(lvl){
  var a=AVATARS[0];
  for(var i=AVATARS.length-1;i>=0;i--){if(lvl>=AVATARS[i].minLvl){a=AVATARS[i];break}}
  return a;
}
function renderAvatar(){
  var lvl=getLevel(state.totalXP);
  var av=getAvatar(lvl);
  document.getElementById('avatar-char').textContent=av.char;
  document.getElementById('avatar-title').textContent=av.title;
  document.getElementById('avatar-rank').textContent=av.rank+' — Level '+lvl;
  var prog=getLevelProgress(state.totalXP);
  var pct=Math.round(prog/XP_PER_LEVEL*100);
  document.getElementById('level-fill').style.width=pct+'%';
  document.getElementById('level-text').textContent=prog+' / '+XP_PER_LEVEL+' XP to next level';
}

/* ========== SKILL TREE ========== */
const SKILLS = [
  {id:'sk_double_sun',name:'Double XP Sunday',icon:'☀️',desc:'2x XP on Sundays',lvl:3},
  {id:'sk_combo_ext',name:'Combo Extender',icon:'⚡',desc:'Combo window +1 min',lvl:5},
  {id:'sk_loot_up',name:'Loot Magnet',icon:'🧲',desc:'+10% loot drop chance',lvl:7},
  {id:'sk_bonus_quest',name:'Bonus Mission',icon:'📜',desc:'+1 daily mission slot',lvl:10},
  {id:'sk_xp_boost',name:'XP Aura',icon:'✨',desc:'+15% XP from all missions',lvl:13},
  {id:'sk_boss_buster',name:'Boss Buster',icon:'💥',desc:'+50 XP from boss defeats',lvl:16},
  {id:'sk_streak_shield',name:'Streak Shield',icon:'🛡️',desc:'Missing 1 day won\'t break streak',lvl:20},
  {id:'sk_reroll',name:'Quest Reroll',icon:'🎲',desc:'Reroll 1 mission per day',lvl:25},
];
function hasSkill(skillId){
  var sk=SKILLS.find(function(s){return s.id===skillId});
  return sk&&getLevel(state.totalXP)>=sk.lvl;
}
function getEffectiveComboWindow(){return hasSkill('sk_combo_ext')?COMBO_WINDOW+60000:COMBO_WINDOW}
function getXPMultiplier(){
  var m=1;
  if(hasSkill('sk_xp_boost')) m+=0.15;
  if(hasSkill('sk_double_sun')&&new Date().getDay()===0) m+=1;
  return m;
}
function getEffectiveLootChance(base){return hasSkill('sk_loot_up')?base+0.1:base}
function getDailyGoal(){
  var lvl=getLevel(state.totalXP);
  return DAILY_GOAL+Math.floor((lvl-1)*10); // Scales with level
}
function renderSkillTree(){
  var sg=document.getElementById('skill-tree');sg.innerHTML='';
  var lvl=getLevel(state.totalXP);
  SKILLS.forEach(function(sk){
    var unlocked=lvl>=sk.lvl;
    var div=document.createElement('div');
    div.className='skill-node'+(unlocked?' unlocked':' locked');
    div.innerHTML='<div class="skill-icon">'+sk.icon+'</div><div class="skill-name">'+sk.name+'</div><div class="skill-desc">'+sk.desc+'</div><div class="skill-req">'+(unlocked?'Unlocked!':'Requires Lvl '+sk.lvl)+'</div>';
    sg.appendChild(div);
  });
}

/* ========== RENDERING ========== */
function render(){
  var lvl=getLevel(state.totalXP);
  document.getElementById('s-level').textContent=lvl;
  document.getElementById('s-xp').textContent=state.totalXP;
  document.getElementById('s-streak').textContent='🔥 '+state.streak;
  renderAvatar();
  // Day theme header
  var dayInfo=getTodayRealm(todayStr());
  var realmObj=REALMS.find(function(r){return r.name===dayInfo.realm});
  document.getElementById('day-theme').innerHTML='<span class="realm-icon">'+(realmObj?realmObj.emoji:'')+'</span> '+dayInfo.title;
  // Daily progress (scales with level)
  var dg=getDailyGoal();
  var dxp=getDailyXP(),pct=Math.min(100,Math.round(dxp/dg*100));
  document.getElementById('prog-fill').style.width=pct+'%';
  document.getElementById('prog-text').textContent=dxp+' / '+dg+' XP';
  var vb=document.getElementById('victory');
  vb.className='victory-banner'+(state.dailyGoalMet?' show':'');
  // Combo bar
  var cb=document.getElementById('combo-bar');
  if(state.comboCount>=2&&state.lastCompleteTime&&(Date.now()-state.lastCompleteTime)<COMBO_WINDOW){
    cb.className='combo-bar show';
    document.getElementById('combo-count').textContent='x'+state.comboCount;
  }else{cb.className='combo-bar'}
  // Quests
  var grid=document.getElementById('quests-grid');grid.innerHTML='';
  dailyQuests.forEach(function(q){
    var done=state.todayDone.indexOf(q.id)!==-1;
    var isEvent=!!q.event;
    var card=document.createElement('div');
    card.className='quest-card'+(done?' completed':'')+(isEvent?' event-quest':'');
    var realmLabel=isEvent?'Random Event':q.realm;
    var emojiChar=isEvent?'⚡':realmEmoji(q.realm);
    var eventTag=isEvent?'<span class="event-badge">EVENT!</span>':'';
    card.innerHTML='<div class="quest-check"></div><div class="quest-emoji">'+emojiChar+
      '</div><div class="quest-info"><div class="quest-realm">'+realmLabel+eventTag+
      '</div><div class="quest-name">'+q.name+'</div></div><div class="quest-right"><div class="quest-points">+'+
      q.pts+' XP</div><div class="quest-diff diff-'+q.diff.toLowerCase()+'">'+q.diff+'</div></div>';
    card.onclick=function(){completeQuest(q.id)};
    grid.appendChild(card);
  });
  // Boss & Skill Tree
  renderBoss();
  renderSkillTree();
  // Achievements
  var ag=document.getElementById('achievements-grid');ag.innerHTML='';
  ACHIEVEMENTS.forEach(function(a){
    var u=!!state.unlocked[a.id];
    var div=document.createElement('div');
    div.className='achievement'+(u?' unlocked':'');
    div.innerHTML='<div class="ach-icon">'+a.icon+'</div><div class="ach-name">'+(u?a.name:'???')+'</div>';
    div.title=u?a.desc:'Locked';
    ag.appendChild(div);
  });
}

function showToast(msg){
  var t=document.getElementById('toast');t.textContent=msg;t.className='toast show';
  setTimeout(function(){t.className='toast'},3000);
}

function resetAll(){
  if(!confirm('Reset ALL progress? This cannot be undone!'))return;
  localStorage.removeItem(STORAGE_KEY);
  state=defaultState();state.lastDate=todayStr();
  dailyQuests=generateDailyQuests(todayStr());
  saveState();render();
}

/* ========== INIT ========== */
checkNewDay();
dailyQuests=generateDailyQuests(todayStr());
render();
</script>

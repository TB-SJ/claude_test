<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Background -->
  <rect width="512" height="512" rx="96" fill="#0a0a0f"/>
  <!-- Gradient definition -->
  <defs>
    <linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
  </defs>
  <!-- Dollar sign circle -->
  <circle cx="256" cy="256" r="160" fill="url(#g)" opacity="0.15"/>
  <!-- Dollar sign -->
  <text x="256" y="320" font-family="system-ui, sans-serif" font-size="240" font-weight="700"
        text-anchor="middle" fill="url(#g)">$</text>
</svg>
